version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: budget-db
    environment:
      POSTGRES_USER: ${DB_USER:-budgetapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-budgetapp_dev}
      POSTGRES_DB: ${DB_NAME:-budgetapp_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-budgetapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: budget-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-budgetapp}
      DB_PASSWORD: ${DB_PASSWORD:-budgetapp_dev}
      DB_NAME: ${DB_NAME:-budgetapp_db}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - budget-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: budget-web
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - budget-network
    restart: unless-stopped

networks:
  budget-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
