version: '3.8'

services:
  postgres:
    image: postgres:13-alpine
    container_name: budgeting-tool-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: budgeting_tool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budgeting-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budgeting-tool-api
    environment:
      NODE_ENV: production
      PORT: 5000
      API_URL: http://localhost:5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/budgeting_tool
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: budgeting_tool
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRY: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    networks:
      - budgeting-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: budgeting-tool-web
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_APP_NAME: Budgeting Tool
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    networks:
      - budgeting-network

volumes:
  postgres_data:

networks:
  budgeting-network:
    driver: bridge
